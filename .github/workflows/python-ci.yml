name: CortexVision CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

permissions:
  contents: read
  issues: write
  pull-requests: write
  
jobs:

  lint:
    name: Syntax Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install flake8
        run: pip install flake8

      - name: Run flake8
        run: |
          flake8 . \
            --exclude=.git,__pycache__,venv \
            --max-line-length=120 \
            --ignore=E501,W503,E221

  import-test:
    name: Import Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          pip install torch==2.1.0 torchvision==0.16.0 --index-url https://download.pytorch.org/whl/cpu
          pip install timm==0.9.7 numpy==1.24.3 pillow==10.0.0

      - name: Test config import
        run: |
          python -c "
          import sys
          sys.path.insert(0, '.')

          # pathlib mock: Drive yolu Colab disinda olmayacak
          import config
          assert len(config.CLASSES) == 4
          assert config.NUM_CLASSES == 4
          assert config.IMAGE_SIZE == 224
          assert config.BATCH_SIZE == 32
          assert config.EFF_MODEL == 'efficientnet_b4'
          assert config.SWIN_MODEL == 'swin_tiny_patch4_window7_224'
          print('config.py OK')
          "

  review-reminder:
    name: PR Review Reminder
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Post review reminder
        uses: actions/github-script@v6
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## Checklist\n\n` +
                    `- [ ] config.py degistirilmediyse import testi gecti mi?\n` +
                    `- [ ] Yeni dosyalar .gitignore kontrolu yapildi mi?\n` +
                    `- [ ] Buyuk dosya (*.pth, data/) push edilmedi mi?\n` +
                    `- [ ] Kod calistirildi mi (en azindan syntax hatasi yok mu)?\n\n` +
                    `> Bu PR'i merge etmeden once her iki taraf onaylamali.`
            })
